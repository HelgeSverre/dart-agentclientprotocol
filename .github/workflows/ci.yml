name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.7.0'
      - run: dart pub get
      - run: dart analyze --fatal-infos
      - run: dart format --output=none --set-exit-if-changed .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        sdk: ['3.7.0', 'stable']
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
      - run: dart pub get
      - run: dart test

  codegen-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.7.0'
      - run: dart pub get
      - run: dart run tool/generate/generate.dart
      - run: dart format lib/src/schema/
      - run: dart analyze lib/src/schema/
      - name: Check for uncommitted codegen changes
        run: |
          if ! git diff --exit-code lib/src/schema/; then
            echo "::error::Generated schema code is out of date. Run 'dart run tool/generate/generate.dart' and commit the result."
            exit 1
          fi

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'
      - run: dart pub get
      - run: dart pub publish --dry-run
