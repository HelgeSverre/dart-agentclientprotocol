<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACP Web Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="main.dart.js"></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-box">ACP</div>
                    <span class="logo-text">Explorer</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <span class="nav-section-title">Connection</span>
                    <div id="status-card" class="status-card disconnected">
                        <div class="status-indicator"></div>
                        <span id="status-text">Disconnected</span>
                    </div>
                </div>

                <div class="nav-section">
                    <span class="nav-section-title">Active Session</span>
                    <div id="session-info" class="session-info empty">
                        No active session
                    </div>
                </div>

                <div class="nav-section flex-grow">
                    <span class="nav-section-title">Capabilities</span>
                    <div id="capabilities-list" class="capabilities-grid">
                        <!-- Capabilities will be injected here -->
                    </div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button id="toggle-mock-btn" class="secondary-btn">
                    <span class="icon">🤖</span>
                    <span id="mock-btn-text">Use Mock Agent</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div id="connection-form" class="connection-form">
                    <input type="text" id="agent-url" placeholder="ws://localhost:8080/acp" value="ws://localhost:8080/acp">
                    <button id="connect-btn" class="primary-btn">Connect</button>
                </div>
                <div id="active-agent-info" class="active-agent-info hidden">
                    <span class="agent-name" id="display-agent-name">Agent Name</span>
                    <span class="agent-version" id="display-agent-version">v1.0.0</span>
                    <button id="disconnect-btn" class="icon-btn" title="Disconnect">✕</button>
                </div>
            </header>

            <section class="chat-viewport">
                <div id="messages-container" class="messages-container">
                    <div class="welcome-screen">
                        <div class="welcome-icon">🔌</div>
                        <h2>Connect to an Agent</h2>
                        <p>Enter a WebSocket URL above or use the Mock Agent to explore the Agent Client Protocol.</p>
                    </div>
                </div>
            </section>

            <footer class="input-bar">
                <div class="input-container">
                    <textarea id="user-input" placeholder="Ask the agent something..." disabled></textarea>
                    <button id="send-btn" class="send-btn" disabled title="Send Message">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <div id="toast-container"></div>
</body>
</html>
